name: Daily Portfolio Optimization

on:
  schedule:
    - cron: '55 19 * * 1-5'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: Install dependencies
        run: pip install -r requirements.txt
        
-       name: Install system dependencies
        run: sudo apt-get install -y liblapack3 liblapack-dev libopenblas-dev
        
      - name: Install IPOPT solver
        run: |
          idaes get-extensions --to ./bin
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Run portfolio optimization
        run: python portfolio.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ README.md
          git commit -m "Daily update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
